---
- name: Create app group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create app system user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Install runtime packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
    update_cache: true

- name: Deploy application files
  ansible.builtin.copy:
    src: "{{ app_src }}/"
    dest: "{{ app_root }}/"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  notify: Restart app

- name: Create Python venv
  ansible.builtin.command: python3 -m venv {{ app_root }}/venv
  args:
    creates: "{{ app_root }}/venv/bin/python"

- name: Fix venv ownership
  ansible.builtin.file:
    path: "{{ app_root }}/venv"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: true

- name: Install systemd unit
  ansible.builtin.template:
    src: app.service.j2
    dest: "/etc/systemd/system/{{ app_name }}.service"
    mode: "0644"
  notify:
    - Daemon reload
    - Restart app

- name: Enable and start app
  ansible.builtin.systemd:
    name: "{{ app_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Allow app port in UFW (local check / future clients)
  community.general.ufw:
    rule: allow
    port: "{{ app_port | string }}"
    proto: tcp
  tags: [app, ufw]
